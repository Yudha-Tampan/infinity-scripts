<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tambah Script — Botify</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 10%,#0e1a2f 0%,#050810 60%);font-family:'Rajdhani',system-ui,sans-serif;color:#e6f2ff;padding:20px;}
  .wrap{max-width:520px;margin:40px auto;background:linear-gradient(160deg,rgba(15,25,45,.9),rgba(8,14,26,.95));border:1px solid rgba(0,212,255,.25);border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,212,255,.15);}
  h1{font-family:'Orbitron',sans-serif;text-align:center;margin:0 0 6px;font-size:22px;letter-spacing:2px;color:#00d4ff;}
  .sub{text-align:center;color:#93a4bd;font-size:13px;margin-bottom:22px;}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#7bb8d9;margin:14px 0 6px;font-weight:600;}
  input,textarea,select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(0,212,255,.2);background:rgba(0,0,0,.35);color:#fff;font-size:15px;box-sizing:border-box;outline:none;font-family:inherit;}
  textarea{min-height:100px;resize:vertical;}
  input:focus,textarea:focus,select:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.15);}
  .btn{width:100%;margin-top:22px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4ff,#0088ff);color:#001827;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .msg{margin-top:12px;padding:10px 12px;border-radius:8px;font-size:13px;display:none;}
  .msg.error{background:rgba(255,60,80,.15);color:#ff8090;display:block;border:1px solid rgba(255,60,80,.3);}
  .msg.ok{background:rgba(0,255,150,.1);color:#7effc0;display:block;border:1px solid rgba(0,255,150,.3);}
  .back{color:#8ba0bd;text-decoration:none;font-size:14px;display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
  .hint{font-size:11px;color:#6b8199;margin-top:4px;}
  #login-required{text-align:center;padding:24px;}
  #login-required a{color:#00d4ff;font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="about.html"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
  <h1>TAMBAH SCRIPT</h1>
  <p class="sub">Kontribusi script bot ke Botify</p>

  <div id="login-required" style="display:none;">
    <p>Kamu harus <a href="login.html">login</a> dulu untuk menambah script.</p>
    <p style="font-size:12px;color:#6b8199;">Belum punya akun? <a href="register.html">Daftar</a></p>
  </div>

  <form id="add-form" style="display:none;">
    <label>Nama Script</label>
    <input type="text" id="nama" required maxlength="80" placeholder="Contoh: Alya MD V8" />

    <label>Kategori</label>
    <select id="kategori" required>
      <option value="">-- Pilih Kategori --</option>
      <option value="MD">MD</option>
      <option value="Bug">Bug</option>
      <option value="Case">Case</option>
      <option value="Plugin">Plugin</option>
      <option value="ESM">ESM</option>
      <option value="CJS">CJS</option>
      <option value="Tools">Tools</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <label>Link Script (Mediafire / GitHub / dll)</label>
    <input type="url" id="link" required placeholder="https://www.mediafire.com/..." />

    <label>Gambar Script (URL)</label>
    <input type="url" id="thumbnail" placeholder="https://i.imgur.com/..." />
    <div class="hint">Opsional. Kosongkan jika tidak ada.</div>

    <label>Deskripsi</label>
    <textarea id="deskripsi" required maxlength="500" placeholder="Deskripsi singkat tentang script..."></textarea>

    <div id="msg" class="msg"></div>
    <button class="btn" id="submit" type="submit">Kirim Script</button>
  </form>
</div>

<script src="botify-db.js"></script>
<script>
  function showMsg(text, type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+type;}
  function ready(fn){if(window.botifyDB)fn();else window.addEventListener('botifyDBReady',fn,{once:true});}
  ready(async ()=>{
    const user = await window.botifyDB.getUser();
    if(!user){
      document.getElementById('login-required').style.display='block';
      return;
    }
    document.getElementById('add-form').style.display='block';
    document.getElementById('add-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn=document.getElementById('submit');
      btn.disabled=true; btn.textContent='Mengirim...';
      try{
        await window.botifyDB.addScript({
          nama: document.getElementById('nama').value.trim(),
          kategori: document.getElementById('kategori').value,
          link: document.getElementById('link').value.trim(),
          thumbnail: document.getElementById('thumbnail').value.trim(),
          deskripsi: document.getElementById('deskripsi').value.trim(),
        });
        showMsg('Script berhasil ditambahkan! Mengalihkan...','ok');
        setTimeout(()=>{location.href='app.html';},900);
      }catch(err){
        showMsg(err.message||'Gagal mengirim script','error');
        btn.disabled=false; btn.textContent='Kirim Script';
      }
    });
  });
</script>
</body>
</html>
