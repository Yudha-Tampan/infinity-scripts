<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — Botify</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="about.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 30% 20%,#0e1a2f 0%,#050810 60%);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',system-ui,sans-serif;color:#e6f2ff;padding:20px;}
  .auth-card{width:100%;max-width:420px;background:linear-gradient(160deg,rgba(15,25,45,.9),rgba(8,14,26,.95));border:1px solid rgba(0,212,255,.25);border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,212,255,.15);}
  .auth-logo{display:flex;justify-content:center;margin-bottom:18px;}
  .auth-logo img{width:64px;height:64px;border-radius:16px;}
  h1{font-family:'Orbitron',sans-serif;text-align:center;margin:0 0 6px;font-size:22px;letter-spacing:2px;color:#00d4ff;}
  .sub{text-align:center;color:#93a4bd;font-size:13px;margin-bottom:22px;}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#7bb8d9;margin:14px 0 6px;font-weight:600;}
  input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(0,212,255,.2);background:rgba(0,0,0,.35);color:#fff;font-size:15px;box-sizing:border-box;outline:none;transition:.2s;}
  input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.15);}
  .btn{width:100%;margin-top:20px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4ff,#0088ff);color:#001827;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .foot{margin-top:18px;text-align:center;font-size:13px;color:#8ba0bd;}
  .foot a{color:#00d4ff;text-decoration:none;font-weight:600;}
  .msg{margin-top:12px;padding:10px 12px;border-radius:8px;font-size:13px;display:none;}
  .msg.error{background:rgba(255,60,80,.15);color:#ff8090;display:block;border:1px solid rgba(255,60,80,.3);}
  .msg.ok{background:rgba(0,255,150,.1);color:#7effc0;display:block;border:1px solid rgba(0,255,150,.3);}
  .back{position:fixed;top:16px;left:16px;color:#8ba0bd;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<a class="back" href="app.html"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
<div class="auth-card">
  <div class="auth-logo"><img src="logo.png" alt="Botify" /></div>
  <h1>MASUK</h1>
  <p class="sub">Login untuk menambah script & simpan favorit</p>
  <form id="login-form">
    <label>Email</label>
    <input type="email" id="email" required autocomplete="email" />
    <label>Password</label>
    <input type="password" id="password" required minlength="6" autocomplete="current-password" />
    <div id="msg" class="msg"></div>
    <button class="btn" id="submit" type="submit">Login</button>
  </form>
  <p class="foot">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
</div>
<script src="botify-db.js"></script>
<script>
  function showMsg(text, type){const m=document.getElementById('msg');m.textContent=text;m.className='msg '+type;}
  function ready(fn){if(window.botifyDB)fn();else window.addEventListener('botifyDBReady',fn,{once:true});}
  ready(()=>{
    document.getElementById('login-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn=document.getElementById('submit');
      btn.disabled=true; btn.textContent='Loading...';
      const email=document.getElementById('email').value.trim();
      const pw=document.getElementById('password').value;
      const { error } = await window.botifyDB.signIn(email, pw);
      if(error){ showMsg(error.message||'Gagal login','error'); btn.disabled=false; btn.textContent='Login'; return; }
      showMsg('Berhasil login, mengalihkan...','ok');
      setTimeout(()=>{location.href='app.html';},600);
    });
  });
</script>
</body>
</html>
